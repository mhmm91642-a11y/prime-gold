<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FFFACD"/>
      <stop offset="60%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(212,175,55,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#8B6914" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Glow background -->
  <circle cx="60" cy="60" r="55" fill="url(#glowBg)"/>
  <!-- Hexagon base -->
  <polygon points="60,8 104,32 104,80 60,104 16,80 16,32" fill="#0a0a0a" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.8"/>
  <!-- Lightning bolt 3D shadow -->
  <path d="M70,20 L45,60 L60,60 L50,100 L80,52 L62,52 L78,20 Z" fill="#8B6914" opacity="0.5" transform="translate(3,4)"/>
  <!-- Lightning bolt main -->
  <path d="M70,20 L45,60 L60,60 L50,100 L80,52 L62,52 L78,20 Z" fill="url(#goldGrad)" filter="url(#glow)"/>
  <!-- Lightning highlight -->
  <path d="M70,20 L62,40 L70,40 L65,55 L72,55 L78,20 Z" fill="rgba(255,255,255,0.4)"/>
  <!-- V letter subtle -->
  <text x="60" y="115" text-anchor="middle" font-family="Arial Black" font-size="9" font-weight="900" fill="url(#goldGrad2)" letter-spacing="3">VULTR</text>
</svg>
