<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FFFACD"/>
      <stop offset="60%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE55C"/>
      <stop offset="40%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#6B4E00"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(212,175,55,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glow background -->
  <circle cx="60" cy="60" r="55" fill="url(#glowBg)"/>
  <!-- Crown 3D shadow -->
  <path d="M20,75 L20,45 L35,60 L60,30 L85,60 L100,45 L100,75 Z" fill="#4A3500" opacity="0.5" transform="translate(2,4)"/>
  <!-- Crown base -->
  <rect x="20" y="72" width="80" height="14" rx="4" fill="url(#crownGrad)" filter="url(#glow)"/>
  <!-- Crown main shape -->
  <path d="M20,75 L20,45 L35,62 L60,30 L85,62 L100,45 L100,75 Z" fill="url(#crownGrad)" filter="url(#glow)"/>
  <!-- Crown highlight -->
  <path d="M20,75 L20,55 L30,60 L60,30 L65,40 L40,65 L20,65 Z" fill="rgba(255,255,255,0.2)"/>
  <!-- Crown gems -->
  <circle cx="60" cy="34" r="5" fill="#FFD700" filter="url(#glow)"/>
  <circle cx="60" cy="34" r="3" fill="rgba(255,255,255,0.9)"/>
  <circle cx="35" cy="62" r="4" fill="#FFD700" opacity="0.9"/>
  <circle cx="35" cy="62" r="2.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="85" cy="62" r="4" fill="#FFD700" opacity="0.9"/>
  <circle cx="85" cy="62" r="2.5" fill="rgba(255,255,255,0.8)"/>
  <!-- 4K Badge -->
  <rect x="40" y="94" width="40" height="18" rx="5" fill="url(#badgeGrad)" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <text x="60" y="107" text-anchor="middle" font-family="Arial Black" font-size="10" font-weight="900" fill="url(#goldGrad)">4K</text>
  <!-- Decorative dots on crown base -->
  <circle cx="30" cy="79" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="45" cy="79" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="60" cy="79" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="75" cy="79" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="90" cy="79" r="2" fill="rgba(255,255,255,0.3)"/>
</svg>
