<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FFFACD"/>
      <stop offset="60%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE55C"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#7A5C00"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(212,175,55,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glow background -->
  <circle cx="60" cy="60" r="55" fill="url(#glowBg)"/>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  <circle cx="60" cy="60" r="44" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.3"/>
  <!-- 8-pointed star shadow -->
  <path d="M60,12 L65,48 L100,48 L72,68 L82,104 L60,82 L38,104 L48,68 L20,48 L55,48 Z" fill="#5A3E00" opacity="0.4" transform="translate(2,3)"/>
  <!-- 8-pointed star -->
  <path d="M60,12 L65,48 L100,48 L72,68 L82,104 L60,82 L38,104 L48,68 L20,48 L55,48 Z" fill="url(#starGrad)" filter="url(#glow)"/>
  <!-- Star highlight -->
  <path d="M60,12 L65,48 L80,48 L60,60 Z" fill="rgba(255,255,255,0.35)"/>
  <!-- Inner star glow -->
  <circle cx="60" cy="60" r="12" fill="rgba(255,215,0,0.3)"/>
  <circle cx="60" cy="60" r="6" fill="#FFD700" opacity="0.8"/>
  <!-- Label -->
  <text x="60" y="116" text-anchor="middle" font-family="Arial Black" font-size="9" font-weight="900" fill="url(#goldGrad)" letter-spacing="4">IFAR</text>
</svg>
