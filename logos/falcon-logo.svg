<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FFFACD"/>
      <stop offset="60%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE55C"/>
      <stop offset="40%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#6B4E00"/>
    </linearGradient>
    <linearGradient id="wingGradR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE55C"/>
      <stop offset="40%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#6B4E00"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(212,175,55,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glow background -->
  <circle cx="60" cy="60" r="55" fill="url(#glowBg)"/>
  <!-- Left wing shadow -->
  <path d="M60,55 L8,30 L15,50 L5,65 L20,60 L30,80 L50,65 Z" fill="#5A3E00" opacity="0.4" transform="translate(2,4)"/>
  <!-- Right wing shadow -->
  <path d="M60,55 L112,30 L105,50 L115,65 L100,60 L90,80 L70,65 Z" fill="#5A3E00" opacity="0.4" transform="translate(2,4)"/>
  <!-- Left wing -->
  <path d="M60,55 L8,30 L15,50 L5,65 L20,60 L30,80 L50,65 Z" fill="url(#wingGrad)" filter="url(#glow)"/>
  <!-- Right wing -->
  <path d="M60,55 L112,30 L105,50 L115,65 L100,60 L90,80 L70,65 Z" fill="url(#wingGradR)" filter="url(#glow)"/>
  <!-- Wing highlights -->
  <path d="M60,55 L8,30 L20,38 L30,55 Z" fill="rgba(255,255,255,0.3)"/>
  <path d="M60,55 L112,30 L100,38 L90,55 Z" fill="rgba(255,255,255,0.3)"/>
  <!-- Body/head of falcon -->
  <ellipse cx="60" cy="52" rx="10" ry="14" fill="url(#goldGrad)"/>
  <!-- Beak -->
  <path d="M60,42 L65,48 L60,50 Z" fill="#B8860B"/>
  <!-- Eye -->
  <circle cx="63" cy="46" r="2.5" fill="#0a0a0a"/>
  <circle cx="63.8" cy="45.2" r="0.8" fill="rgba(255,255,255,0.8)"/>
  <!-- Tail feathers -->
  <path d="M52,66 L60,90 L68,66 Z" fill="url(#goldGrad)"/>
  <!-- Label -->
  <text x="60" y="110" text-anchor="middle" font-family="Arial Black" font-size="8" font-weight="900" fill="url(#goldGrad)" letter-spacing="2">FALCON</text>
</svg>
