<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FFFACD"/>
      <stop offset="60%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <radialGradient id="planetGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#FFE55C"/>
      <stop offset="40%" style="stop-color:#D4AF37"/>
      <stop offset="80%" style="stop-color:#8B6914"/>
      <stop offset="100%" style="stop-color:#4A3500"/>
    </radialGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(212,175,55,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ringGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glow background -->
  <circle cx="60" cy="60" r="55" fill="url(#glowBg)"/>
  <!-- Stars -->
  <circle cx="20" cy="20" r="1.2" fill="#FFD700" opacity="0.7"/>
  <circle cx="95" cy="15" r="1" fill="#FFD700" opacity="0.5"/>
  <circle cx="105" cy="40" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="15" cy="85" r="1" fill="#FFD700" opacity="0.4"/>
  <circle cx="100" cy="90" r="1.2" fill="#FFD700" opacity="0.6"/>
  <circle cx="30" cy="100" r="0.8" fill="#FFD700" opacity="0.5"/>
  <!-- Orbit ring back half -->
  <ellipse cx="60" cy="60" rx="50" ry="16" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-dasharray="1 0" opacity="0.3" transform="rotate(-20, 60, 60)"/>
  <!-- Planet shadow -->
  <circle cx="60" cy="60" r="28" fill="#3A2800" opacity="0.5" transform="translate(3,4)"/>
  <!-- Planet main -->
  <circle cx="60" cy="60" r="28" fill="url(#planetGrad)" filter="url(#glow)"/>
  <!-- Planet surface lines -->
  <ellipse cx="60" cy="60" rx="28" ry="10" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <ellipse cx="60" cy="52" rx="22" ry="7" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <ellipse cx="60" cy="68" rx="22" ry="7" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Planet highlight -->
  <ellipse cx="50" cy="48" rx="10" ry="7" fill="rgba(255,255,255,0.2)" transform="rotate(-20, 50, 48)"/>
  <!-- Orbit ring front half -->
  <ellipse cx="60" cy="60" rx="50" ry="16" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-dasharray="78 78" stroke-dashoffset="0" opacity="0.9" transform="rotate(-20, 60, 60)" filter="url(#ringGlow)"/>
  <!-- Small moon -->
  <circle cx="105" cy="52" r="5" fill="url(#goldGrad)" opacity="0.8"/>
  <!-- Label -->
  <text x="60" y="116" text-anchor="middle" font-family="Arial Black" font-size="7.5" font-weight="900" fill="url(#goldGrad)" letter-spacing="1.5">UNIVERSE</text>
</svg>
