<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FFFACD"/>
      <stop offset="60%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE55C"/>
      <stop offset="40%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#7A5C00"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(212,175,55,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glow background -->
  <circle cx="60" cy="60" r="55" fill="url(#glowBg)"/>
  <!-- Shield 3D shadow -->
  <path d="M60,15 L100,30 L100,68 C100,88 60,108 60,108 C60,108 20,88 20,68 L20,30 Z" fill="#5A3E00" opacity="0.5" transform="translate(3,4)"/>
  <!-- Shield outer -->
  <path d="M60,15 L100,30 L100,68 C100,88 60,108 60,108 C60,108 20,88 20,68 L20,30 Z" fill="url(#shieldGrad)" filter="url(#glow)"/>
  <!-- Shield inner border -->
  <path d="M60,22 L94,35 L94,66 C94,83 60,101 60,101 C60,101 26,83 26,66 L26,35 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Shield highlight left -->
  <path d="M60,22 L94,35 L94,50 L60,38 Z" fill="rgba(255,255,255,0.25)"/>
  <!-- H letter in center -->
  <text x="60" y="72" text-anchor="middle" font-family="Arial Black" font-size="32" font-weight="900" fill="#0a0a0a" opacity="0.9">H</text>
  <text x="60" y="70" text-anchor="middle" font-family="Arial Black" font-size="32" font-weight="900" fill="rgba(255,255,255,0.15)">H</text>
  <!-- Stars decoration -->
  <circle cx="60" cy="32" r="3" fill="#FFD700" opacity="0.9"/>
  <circle cx="50" cy="35" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="70" cy="35" r="2" fill="#FFD700" opacity="0.6"/>
  <!-- Label -->
  <text x="60" y="116" text-anchor="middle" font-family="Arial Black" font-size="9" font-weight="900" fill="url(#goldGrad)" letter-spacing="3">HULK</text>
</svg>
